<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C列 重複チェックツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #c8f560;
    --accent-dim: #8aaa3a;
    --text: #efefef;
    --text-muted: #888;
    --text-dim: #555;
    --danger: #ff5f5f;
    --info: #5fc8ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem;
  }

  header {
    width: 100%;
    max-width: 680px;
    margin-bottom: 3rem;
  }

  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .main {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .drop-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .drop {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--surface);
    position: relative;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .drop input[type="file"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
  }

  .drop:hover { border-color: var(--accent-dim); }

  .drop.ready {
    border-color: var(--accent);
    background: #1a1f10;
  }

  .drop-icon {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--accent);
    background: #1e2a0a;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 4px;
  }

  .drop-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .drop-sub {
    font-size: 11px;
    color: var(--text-dim);
  }

  .drop-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    margin-top: 4px;
    word-break: break-all;
    line-height: 1.4;
  }

  .run-btn {
    width: 100%;
    padding: 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #0f0f0f;
    transition: opacity 0.2s, transform 0.1s;
  }

  .run-btn:hover { opacity: 0.88; }
  .run-btn:active { transform: scale(0.99); }

  .run-btn:disabled {
    border-color: var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: not-allowed;
    opacity: 1;
  }

  .status {
    padding: 12px 14px;
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    display: none;
    line-height: 1.5;
  }

  .status.info { background: #0d1f2a; color: var(--info); border: 1px solid #1a3a4a; }
  .status.success { background: #141f08; color: var(--accent); border: 1px solid #2a3f10; }
  .status.error { background: #1f0d0d; color: var(--danger); border: 1px solid #3f1a1a; }

  .result-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    display: none;
  }

  .result-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .stat {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 10px;
    text-align: center;
  }

  .stat-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 26px;
    font-weight: 600;
    color: var(--accent);
  }

  .stat-lbl {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .dl-btn {
    width: 100%;
    padding: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    transition: background 0.15s;
  }

  .dl-btn:hover { background: #1a1f10; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0.5rem 0 1rem;
  }

  footer {
    margin-top: 3rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<header>
  <div class="tag">C列 重複チェックツール</div>
  <h1>CSV <span>×</span> XLSX<br>Comparator</h1>
  <p class="subtitle">CSVとXLSXのC列（2行目以降）を比較し、重複を先頭に並べた新しいCSVを生成します。</p>
</header>

<main class="main">
  <div class="drop-grid">
    <label class="drop" id="dropCSV">
      <input type="file" accept=".csv" id="fileCSV">
      <div class="drop-icon">.CSV</div>
      <div class="drop-title">CSVファイル</div>
      <div class="drop-sub">クリックして選択</div>
      <div class="drop-name" id="nameCSV"></div>
    </label>
    <label class="drop" id="dropXLSX">
      <input type="file" accept=".xlsx,.xls" id="fileXLSX">
      <div class="drop-icon">.XLSX</div>
      <div class="drop-title">XLSXファイル</div>
      <div class="drop-sub">クリックして選択</div>
      <div class="drop-name" id="nameXLSX"></div>
    </label>
  </div>

  <button class="run-btn" id="runBtn" disabled>ファイルを2つ選択してください</button>

  <div class="status" id="status"></div>

  <div class="result-box" id="resultBox">
    <div class="result-label">Result</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="sCSV">-</div>
        <div class="stat-lbl">CSV件数</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="sXLSX">-</div>
        <div class="stat-lbl">XLSX件数</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="sDup">-</div>
        <div class="stat-lbl">重複件数</div>
      </div>
    </div>
    <div class="divider"></div>
    <button class="dl-btn" id="dlBtn">↓ CSVをダウンロード</button>
  </div>
</main>

<footer>// C列比較ツール — vercel ready</footer>

<script>
let csvData = null, xlsxData = null, resultCSV = null;

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
  el.style.display = 'block';
}

function updateBtn() {
  const btn = document.getElementById('runBtn');
  if (csvData && xlsxData) {
    btn.disabled = false;
    btn.textContent = '重複チェックして新しいCSVを作成 →';
  } else {
    btn.disabled = true;
    btn.textContent = 'ファイルを2つ選択してください';
  }
}

function readCSVFile(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        let text = e.target.result;
        // BOM除去
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
        const lines = text.split(/\r?\n/);
        const vals = [];
        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;
          // CSV列分割（ダブルクォート対応）
          const cols = parseCSVLine(line);
          if (cols.length >= 3) {
            const v = cols[2].trim();
            if (v !== '') vals.push(v);
          }
        }
        res(vals);
      } catch(err) { rej(err); }
    };
    reader.onerror = rej;
    reader.readAsText(file, 'UTF-8');
  });
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
      else inQuote = !inQuote;
    } else if (c === ',' && !inQuote) {
      result.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur);
  return result;
}

function readXLSXFile(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        const vals = [];
        for (let i = 1; i < rows.length; i++) {
          const v = String(rows[i][2] ?? '').trim();
          if (v !== '') vals.push(v);
        }
        res(vals);
      } catch(err) { rej(err); }
    };
    reader.onerror = rej;
    reader.readAsArrayBuffer(file);
  });
}

document.getElementById('fileCSV').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('nameCSV').textContent = file.name;
  document.getElementById('dropCSV').classList.add('ready');
  try {
    csvData = await readCSVFile(file);
    showStatus('CSV読み込み完了: ' + csvData.length + '件', 'info');
    updateBtn();
  } catch(err) {
    showStatus('CSVの読み込みエラー: ' + err.message, 'error');
  }
});

document.getElementById('fileXLSX').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('nameXLSX').textContent = file.name;
  document.getElementById('dropXLSX').classList.add('ready');
  try {
    xlsxData = await readXLSXFile(file);
    showStatus('XLSX読み込み完了: ' + xlsxData.length + '件', 'info');
    updateBtn();
  } catch(err) {
    showStatus('XLSXの読み込みエラー: ' + err.message, 'error');
  }
});

document.getElementById('runBtn').addEventListener('click', () => {
  if (!csvData || !xlsxData) return;
  showStatus('処理中...', 'info');

  try {
    const xlsxSet = new Set(xlsxData);
    const csvSet = new Set(csvData);

    // CSV側: 重複あり → 重複なし
    const dupCSV = csvData.filter(v => xlsxSet.has(v));
    const noDupCSV = csvData.filter(v => !xlsxSet.has(v));

    // XLSX側: 重複あり → 重複なし
    const dupXLSX = xlsxData.filter(v => csvSet.has(v));
    const noDupXLSX = xlsxData.filter(v => !csvSet.has(v));

    const col1 = [...dupCSV, ...noDupCSV];
    const col2 = [...dupXLSX, ...noDupXLSX];
    const maxLen = Math.max(col1.length, col2.length);

    const lines = ['CSV_C列,XLSX_C列'];
    for (let i = 0; i < maxLen; i++) {
      const a = (col1[i] ?? '').replace(/"/g, '""');
      const b = (col2[i] ?? '').replace(/"/g, '""');
      lines.push('"' + a + '","' + b + '"');
    }
    resultCSV = lines.join('\n');

    document.getElementById('sCSV').textContent = csvData.length;
    document.getElementById('sXLSX').textContent = xlsxData.length;
    document.getElementById('sDup').textContent = dupCSV.length;
    document.getElementById('resultBox').style.display = 'block';
    showStatus('完了！重複 ' + dupCSV.length + ' 件を先頭に並べました。', 'success');
  } catch(err) {
    showStatus('処理エラー: ' + err.message, 'error');
  }
});

document.getElementById('dlBtn').addEventListener('click', () => {
  if (!resultCSV) return;
  const bom = '\uFEFF';
  const blob = new Blob([bom + resultCSV], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'result.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
